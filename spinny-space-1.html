<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20192%20192%22%3E%3Crect%20width%3D%22192%22%20height%3D%22192%22%20rx%3D%2232%22%20fill%3D%22%232b3a67%22%2F%3E%3Ccircle%20cx%3D%2260%22%20cy%3D%2250%22%20r%3D%2234%22%20fill%3D%22%23ffd166%22%2F%3E%3Ccircle%20cx%3D%22125%22%20cy%3D%22120%22%20r%3D%2240%22%20fill%3D%22%233aa0ff%22%2F%3E%3Cellipse%20cx%3D%22110%22%20cy%3D%22105%22%20rx%3D%2218%22%20ry%3D%2214%22%20fill%3D%22%234caf6d%22%2F%3E%3Cellipse%20cx%3D%22145%22%20cy%3D%22135%22%20rx%3D%2212%22%20ry%3D%229%22%20fill%3D%22%234caf6d%22%2F%3E%3Ccircle%20cx%3D%22165%22%20cy%3D%2260%22%20r%3D%2214%22%20fill%3D%22%23e8e8f0%22%2F%3E%3C%2Fsvg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20192%20192%22%3E%3Crect%20width%3D%22192%22%20height%3D%22192%22%20rx%3D%2232%22%20fill%3D%22%232b3a67%22%2F%3E%3Ccircle%20cx%3D%2260%22%20cy%3D%2250%22%20r%3D%2234%22%20fill%3D%22%23ffd166%22%2F%3E%3Ccircle%20cx%3D%22125%22%20cy%3D%22120%22%20r%3D%2240%22%20fill%3D%22%233aa0ff%22%2F%3E%3Cellipse%20cx%3D%22110%22%20cy%3D%22105%22%20rx%3D%2218%22%20ry%3D%2214%22%20fill%3D%22%234caf6d%22%2F%3E%3Cellipse%20cx%3D%22145%22%20cy%3D%22135%22%20rx%3D%2212%22%20ry%3D%229%22%20fill%3D%22%234caf6d%22%2F%3E%3Ccircle%20cx%3D%22165%22%20cy%3D%2260%22%20r%3D%2214%22%20fill%3D%22%23e8e8f0%22%2F%3E%3C%2Fsvg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#1b2350;
    --night2:#2b3a67;
    --day-top:#7ec8e3;
    --day-bottom:#bfe9ff;
    --sun:#ffd166;
    --sun2:#ff9f5b;
    --earth-blue:#3aa0ff;
    --earth-green:#4caf6d;
    --moon:#e8e8f0;
    --moon-shadow:#b9bcd6;
    --ink:#2b2b3a;
    --card:#ffffff;
    --accent:#ff6f91;
    --accent2:#9b5de5;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; height:100%; overscroll-behavior:none;}
  body{
    font-family:'Baloo 2','Fredoka','Comic Sans MS',system-ui,sans-serif;
    background: linear-gradient(180deg,var(--night) 0%, var(--night2) 100%);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    user-select:none;
    touch-action: manipulation;
  }
  /* ===== Top bar ===== */
  header{
    text-align:center;
    padding: 14px 10px 8px;
    color:#fff;
    flex-shrink:0;
  }
  header h1{
    margin:0;
    font-size: clamp(20px, 6vw, 30px);
    letter-spacing: 0.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,.35);
  }
  header p{
    margin: 4px 0 0;
    font-size: clamp(13px, 3.6vw, 16px);
    opacity:.85;
  }

  /* ===== Main scene area ===== */
  main{
    flex:1;
    position:relative;
    overflow:hidden;
    border-radius: 28px;
    margin: 6px 10px;
    background: linear-gradient(180deg, var(--day-top) 0%, var(--day-bottom) 70%);
    box-shadow: inset 0 0 0 4px rgba(255,255,255,.25);
    min-height: 55vh;
  }
  .scene{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
  }
  .scene.active{display:flex;}

  /* stars */
  .stars{
    position:absolute; inset:0;
    background-image:
      radial-gradient(2px 2px at 10% 20%, #fff, transparent),
      radial-gradient(2px 2px at 80% 15%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 60% 30%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 30% 70%, #fff, transparent),
      radial-gradient(2px 2px at 90% 60%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 45% 85%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 75% 80%, #fff, transparent);
    opacity:0;
    transition: opacity .8s ease;
    pointer-events:none;
  }

  /* ===== Scene 1: Spin (rotation / day-night) ===== */
  #scene-spin .stage{
    position:relative;
    width:min(78vw, 340px);
    height:min(78vw, 340px);
  }
  .sun-fixed{
    position:absolute;
    left:50%; top:8%;
    transform: translate(-50%,-50%);
    width: 22%;
    height: 22%;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--sun), var(--sun2));
    box-shadow: 0 0 40px 10px rgba(255,200,90,.7);
    z-index:1;
  }
  .sun-fixed::before{
    content:'';
    position:absolute; inset:-30%;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,209,102,.35), transparent 70%);
    z-index:-1;
  }
  .earth-wrap{
    position:absolute;
    left:50%; top:50%;
    width: 58%;
    height: 58%;
    transform: translate(-50%,-50%);
    border-radius:50%;
    overflow:hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,.25), inset -14px -10px 30px rgba(0,0,0,.35);
    z-index:2;
  }
  .earth-surface{
    position:absolute; inset:0;
    border-radius:50%;
    background: var(--earth-blue);
    transform-origin:center center;
  }
  .earth-surface .land{
    position:absolute;
    background: var(--earth-green);
    border-radius:40% 60% 50% 50%;
  }
  .land1{ width:46%; height:34%; top:14%; left:8%; transform:rotate(-12deg);}
  .land2{ width:30%; height:24%; top:50%; left:55%; transform:rotate(18deg);}
  .land3{ width:22%; height:18%; top:70%; left:15%; transform:rotate(8deg);}
  .face{
    position:absolute;
    inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding-bottom: 28%;
    z-index:3;
  }
  .face .eyes{display:flex; gap:18%;}
  .face .eye{
    width:11%; aspect-ratio:1; background:#2b2b3a; border-radius:50%;
  }
  .face .mouth{
    margin-top:6%;
    width:34%; height:14%;
    border-bottom: 5px solid #2b2b3a;
    border-radius: 0 0 60px 60px;
  }
  .night-overlay{
    position:absolute; inset:0;
    border-radius:50%;
    background: linear-gradient(180deg, transparent 45%, rgba(10,15,40,.55) 65%, rgba(10,15,40,.85) 100%);
    z-index:4;
    pointer-events:none;
  }
  .moon-orbit-wrap{
    position:absolute;
    left:50%; top:50%;
    width: 84%;
    height: 84%;
    margin-left:-42%;
    margin-top:-42%;
    border-radius:50%;
    animation: moon-orbit-spin 14s linear infinite;
    z-index:1;
    pointer-events:none;
  }
  .moon-body{
    position:absolute;
    top:6%; left:50%;
    width:13%;
    height:13%;
    margin-left:-6.5%;
    margin-top:-6.5%;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--moon), var(--moon-shadow));
    box-shadow: 0 3px 8px rgba(0,0,0,.25);
  }
  @keyframes moon-orbit-spin{
    from{ transform: rotate(0deg); }
    to{ transform: rotate(360deg); }
  }

  /* ===== Scene 2: Orbit (revolution / seasons) ===== */
  #scene-orbit .stage{
    position:relative;
    width:min(86vw, 360px);
    height:min(86vw, 360px);
  }
  .orbit-path{
    position:absolute;
    inset:0;
    border:3px dashed rgba(255,255,255,.55);
    border-radius:50%;
  }
  .sun-center{
    position:absolute;
    left:50%; top:50%;
    width: 24%;
    height:24%;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--sun), var(--sun2));
    box-shadow: 0 0 50px 14px rgba(255,200,90,.7);
    z-index:2;
  }
  .orbit-rotor{
    position:absolute; inset:0;
    transform-origin: 50% 50%;
  }
  .earth-on-orbit{
    position:absolute;
    left:50%; top:0%;
    width: 17%;
    height: 17%;
    margin-left: -8.5%;
    margin-top: -8.5%;
  }
  .earth-on-orbit .earth-mini{
    width:100%; height:100%;
    border-radius:50%;
    background: var(--earth-blue);
    box-shadow: 0 6px 16px rgba(0,0,0,.25);
    position:relative;
    overflow:hidden;
  }
  .earth-mini .land{ position:absolute; background:var(--earth-green); border-radius:45%;}
  .earth-mini .land1{width:60%; height:45%; top:10%; left:15%;}
  .earth-mini .land2{width:40%; height:30%; top:55%; left:50%;}
  .moon-mini-orbit{
    position:absolute;
    inset: -55%;
    border-radius:50%;
    animation: moon-spin 6s linear infinite;
    pointer-events:none;
  }
  .moon-mini{
    position:absolute;
    top:0; left:50%;
    width:22%;
    height:22%;
    margin-left:-11%;
    margin-top:-11%;
    border-radius:50%;
    background: var(--moon);
    box-shadow: 0 2px 5px rgba(0,0,0,.2);
  }
  @keyframes moon-spin{
    from{ transform: rotate(0deg); }
    to{ transform: rotate(360deg); }
  }
  .season-tag{
    position:absolute;
    top:-46px; left:50%;
    transform:translateX(-50%);
    font-size:22px;
    white-space:nowrap;
  }

  /* ===== Controls panel ===== */
  .controls{
    margin: 8px 10px 4px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .control-card{
    background: var(--card);
    border-radius:20px;
    padding:12px 16px;
    box-shadow: 0 4px 14px rgba(0,0,0,.18);
    text-align:center;
  }
  .control-card .label-row{
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-weight:700; font-size: clamp(15px,4vw,18px);
    margin-bottom:6px;
  }
  .big-emoji{font-size: clamp(20px,5vw,26px);}
  input[type=range]{
    width:100%;
    height: 34px;
    -webkit-appearance:none;
    appearance:none;
    background:transparent;
    cursor:pointer;
  }
  input[type=range]::-webkit-slider-runnable-track{
    height:10px;
    border-radius:6px;
    background: linear-gradient(90deg,var(--accent2),var(--accent),var(--sun));
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:34px; height:34px;
    border-radius:50%;
    background: var(--card);
    border: 4px solid var(--accent2);
    margin-top:-12px;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  input[type=range]::-moz-range-track{
    height:10px; border-radius:6px;
    background: linear-gradient(90deg,var(--accent2),var(--accent),var(--sun));
  }
  input[type=range]::-moz-range-thumb{
    width:34px; height:34px; border-radius:50%;
    background: var(--card); border:4px solid var(--accent2);
  }
  .status-text{
    font-size: clamp(14px,4vw,17px);
    font-weight:600;
    min-height: 24px;
  }
  .play-row{
    display:flex; gap:10px; justify-content:center; margin-top:6px;
  }
  .pill-btn{
    border:none;
    border-radius:999px;
    padding: 10px 18px;
    font-size: clamp(14px,4vw,16px);
    font-weight:700;
    background: var(--accent2);
    color:#fff;
    box-shadow: 0 4px 10px rgba(0,0,0,.2);
  }
  .pill-btn.alt{ background: var(--accent); }
  .pill-btn:active{ transform: scale(.95); }

  /* ===== Bottom tab nav ===== */
  nav{
    display:flex;
    justify-content:center;
    gap: 10px;
    padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
    flex-shrink:0;
  }
  .tab{
    flex:1;
    max-width:160px;
    background: rgba(255,255,255,.12);
    color:#fff;
    border:2px solid rgba(255,255,255,.25);
    border-radius:18px;
    padding: 10px 6px;
    text-align:center;
    font-weight:700;
    font-size: clamp(12px,3.4vw,15px);
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .tab .ic{font-size: clamp(22px,6vw,28px);}
  .tab.active{
    background: var(--accent2);
    border-color: var(--accent2);
  }

  /* ===== Reduced motion ===== */
  @media (prefers-reduced-motion: reduce){
    *{transition-duration: .01ms !important; animation-duration: .01ms !important;}
  }
</style>
</head>
<body>

<header>
  <h1>🌞 Sun, Earth &amp; Moon 🌍</h1>
  <p id="subtitle">Tap and slide to explore!</p>
</header>

<main>

  <!-- SCENE 1: Spin = rotation = day & night -->
  <section class="scene active" id="scene-spin">
    <div class="stars" id="stars-spin"></div>
    <div class="stage">
      <div class="sun-fixed"></div>
      <div class="earth-wrap">
        <div class="earth-surface" id="earth-surface">
          <div class="land land1"></div>
          <div class="land land2"></div>
          <div class="land land3"></div>
        </div>
        <div class="night-overlay"></div>
        <div class="face">
          <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
          </div>
          <div class="mouth"></div>
        </div>
      </div>
      <div class="moon-orbit-wrap">
        <div class="moon-body"></div>
      </div>
    </div>
  </section>

  <!-- SCENE 2: Orbit = revolution = seasons -->
  <section class="scene" id="scene-orbit">
    <div class="stars" id="stars-orbit"></div>
    <div class="stage">
      <div class="orbit-path"></div>
      <div class="sun-center"></div>
      <div class="orbit-rotor" id="orbit-rotor">
        <div class="earth-on-orbit">
          <div class="season-tag" id="season-tag">🌱</div>
          <div class="earth-mini">
            <div class="land land1"></div>
            <div class="land land2"></div>
          </div>
          <div class="moon-mini-orbit">
            <div class="moon-mini"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

</main>

<div class="controls">

  <!-- Spin controls -->
  <div class="control-card" id="controls-spin">
    <div class="label-row"><span class="big-emoji">🔄</span><span>Spin the Earth!</span></div>
    <input type="range" id="spin-slider" min="0" max="100" value="0" aria-label="Rotate the Earth to make day and night">
    <div class="status-text" id="spin-status">☀️ It's DAYTIME!</div>
    <div class="play-row">
      <button class="pill-btn" id="spin-play">▶️ Auto Spin</button>
    </div>
  </div>

  <!-- Orbit controls -->
  <div class="control-card" id="controls-orbit" style="display:none;">
    <div class="label-row"><span class="big-emoji">🪐</span><span>Move Earth around the Sun!</span></div>
    <input type="range" id="orbit-slider" min="0" max="100" value="0" aria-label="Move the Earth around the Sun to change seasons">
    <div class="status-text" id="orbit-status">🌱 Springtime!</div>
    <div class="play-row">
      <button class="pill-btn alt" id="orbit-play">▶️ Auto Orbit</button>
    </div>
  </div>

</div>

<nav>
  <button class="tab active" data-scene="spin">
    <span class="ic">🔄</span>
    <span>Day &amp; Night</span>
  </button>
  <button class="tab" data-scene="orbit">
    <span class="ic">🪐</span>
    <span>Seasons</span>
  </button>
</nav>

<script>
// ===== Tab navigation =====
const tabs = document.querySelectorAll('.tab');
const scenes = document.querySelectorAll('.scene');
const subtitle = document.getElementById('subtitle');
const controlsSpin = document.getElementById('controls-spin');
const controlsOrbit = document.getElementById('controls-orbit');

const subtitles = {
  spin: "Slide to spin the Earth — watch day turn to night!",
  orbit: "Slide to move Earth around the Sun — watch the seasons change!"
};

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const scene = tab.dataset.scene;
    tabs.forEach(t => t.classList.toggle('active', t === tab));
    scenes.forEach(s => s.classList.toggle('active', s.id === 'scene-' + scene));
    controlsSpin.style.display = scene === 'spin' ? '' : 'none';
    controlsOrbit.style.display = scene === 'orbit' ? '' : 'none';
    subtitle.textContent = subtitles[scene];
    // stop any auto-play when switching
    stopSpinAuto();
    stopOrbitAuto();
  });
});

// ===== SCENE 1: Spin / Day & Night =====
const earthSurface = document.getElementById('earth-surface');
const spinSlider = document.getElementById('spin-slider');
const spinStatus = document.getElementById('spin-status');
const spinPlayBtn = document.getElementById('spin-play');
const starsSpin = document.getElementById('stars-spin');

function updateSpin(val){
  // val: 0-100 -> 0-360 deg
  const deg = (val / 100) * 360;
  earthSurface.style.transform = `rotate(${deg}deg)`;

  // Determine day/night based on rotation angle.
  const norm = ((deg % 360) + 360) % 360;
  let label, isNight;
  if (norm < 45 || norm >= 315) {
    label = "☀️ It's DAYTIME!";
    isNight = false;
  } else if (norm >= 45 && norm < 135) {
    label = "🌅 Sunrise / Sunset time!";
    isNight = norm >= 90;
  } else if (norm >= 135 && norm < 225) {
    label = "🌙 It's NIGHTTIME!";
    isNight = true;
  } else {
    label = "🌇 Sunrise / Sunset time!";
    isNight = norm < 270;
  }
  spinStatus.textContent = label;
  starsSpin.style.opacity = isNight ? '1' : '0';
}

spinSlider.addEventListener('input', e => {
  updateSpin(Number(e.target.value));
});

// Auto-spin
let spinAutoInterval = null;
function stopSpinAuto(){
  if (spinAutoInterval){
    clearInterval(spinAutoInterval);
    spinAutoInterval = null;
    spinPlayBtn.textContent = '▶️ Auto Spin';
  }
}
spinPlayBtn.addEventListener('click', () => {
  if (spinAutoInterval){
    stopSpinAuto();
    return;
  }
  spinPlayBtn.textContent = '⏸️ Stop';
  spinAutoInterval = setInterval(() => {
    let val = Number(spinSlider.value) + 1;
    if (val > 100) val = 0;
    spinSlider.value = val;
    updateSpin(val);
  }, 60);
});

updateSpin(0);

// ===== SCENE 2: Orbit / Seasons =====
const orbitRotor = document.getElementById('orbit-rotor');
const orbitSlider = document.getElementById('orbit-slider');
const orbitStatus = document.getElementById('orbit-status');
const orbitPlayBtn = document.getElementById('orbit-play');
const seasonTag = document.getElementById('season-tag');
const starsOrbit = document.getElementById('stars-orbit');

const seasons = [
  { name: "Spring 🌱", emoji: "🌱", desc: "🌱 Springtime! Flowers grow.", range: [0, 25] },
  { name: "Summer ☀️", emoji: "☀️", desc: "☀️ Summertime! Nice and warm.", range: [25, 50] },
  { name: "Autumn 🍂", emoji: "🍂", desc: "🍂 Autumn! Leaves fall down.", range: [50, 75] },
  { name: "Winter ❄️", emoji: "❄️", desc: "❄️ Wintertime! Brrr, it's cold!", range: [75, 100.0001] },
];

function updateOrbit(val){
  const deg = (val / 100) * 360;
  orbitRotor.style.transform = `rotate(${deg}deg)`;
  const earthOnOrbit = orbitRotor.querySelector('.earth-on-orbit');
  earthOnOrbit.style.transform = `rotate(${-deg}deg)`;

  const season = seasons.find(s => val >= s.range[0] && val < s.range[1]) || seasons[0];
  orbitStatus.textContent = season.desc;
  seasonTag.textContent = season.emoji;

  starsOrbit.style.opacity = (val >= 75) ? '0.3' : '0';
}

orbitSlider.addEventListener('input', e => {
  updateOrbit(Number(e.target.value));
});

let orbitAutoInterval = null;
function stopOrbitAuto(){
  if (orbitAutoInterval){
    clearInterval(orbitAutoInterval);
    orbitAutoInterval = null;
    orbitPlayBtn.textContent = '▶️ Auto Orbit';
  }
}
orbitPlayBtn.addEventListener('click', () => {
  if (orbitAutoInterval){
    stopOrbitAuto();
    return;
  }
  orbitPlayBtn.textContent = '⏸️ Stop';
  orbitAutoInterval = setInterval(() => {
    let val = Number(orbitSlider.value) + 0.5;
    if (val > 100) val = 0;
    orbitSlider.value = val;
    updateOrbit(val);
  }, 60);
});

updateOrbit(0);

// ===== Register service worker for offline/installable PWA (inline, no extra file) =====
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'spinny-space-v1';
    self.addEventListener('install', (e) => { self.skipWaiting(); });
    self.addEventListener('activate', (e) => { self.clients.claim(); });
    self.addEventListener('fetch', (e) => {
      e.respondWith(
        caches.open(CACHE_NAME).then(async (cache) => {
          const cached = await cache.match(e.request);
          if (cached) return cached;
          try {
            const res = await fetch(e.request);
            if (res && res.status === 200) cache.put(e.request, res.clone());
            return res;
          } catch (err) {
            return cached || Response.error();
          }
        })
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  window.addEventListener('load', () => {
    navigator.serviceWorker.register(swUrl).catch(() => {});
  });
}
</script>
</body>
</html>
